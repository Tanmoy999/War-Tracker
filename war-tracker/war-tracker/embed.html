<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Embed — Conflict Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root{--red:#e63946;--orange:#f4a261;--yellow:#e9c46a;--cyan:#48cae4;--white:#f1faee;--dark:#0a0a0f;--panel:#111118;--border:rgba(255,255,255,0.07);--muted:#666680;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--white);font-family:'IBM Plex Sans',sans-serif;padding:8px;}
  .embed-card{background:var(--panel);padding:20px;border:1px solid var(--border);position:relative;overflow:hidden;}
  .embed-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .embed-card.red::before{background:var(--red);}.embed-card.orange::before{background:var(--orange);}.embed-card.yellow::before{background:var(--yellow);}.embed-card.cyan::before{background:var(--cyan);}
  .embed-label{font-family:'IBM Plex Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .embed-number{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;}
  .embed-card.red .embed-number{color:var(--red);}.embed-card.orange .embed-number{color:var(--orange);}.embed-card.yellow .embed-number{color:var(--yellow);}.embed-card.cyan .embed-number{color:var(--cyan);}
  .embed-sub{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--muted);margin-top:6px;line-height:1.4;}
  .embed-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
  .embed-footer a{font-family:'IBM Plex Mono',monospace;font-size:0.55rem;color:var(--cyan);text-decoration:none;letter-spacing:0.1em;}
  .embed-footer span{font-family:'IBM Plex Mono',monospace;font-size:0.5rem;color:var(--muted);}
</style>
</head>
<body>
<div class="embed-card" id="card"></div>
<script>
const params = new URLSearchParams(window.location.search);
const statId = params.get('stat') || 'total_deaths';
fetch('./data/stats.json?t=' + Date.now()).then(r => r.json()).then(data => {
  const stat = data.globalStats.find(s => s.id === statId);
  if (!stat) { document.getElementById('card').innerHTML = '<div class="embed-label">Stat not found</div>'; return; }
  const card = document.getElementById('card');
  card.className = 'embed-card ' + stat.color;
  card.innerHTML = `
    <div class="embed-label">${stat.label}</div>
    <div class="embed-number">${stat.value}</div>
    <div class="embed-sub">${stat.sub}</div>
    <div class="embed-footer">
      <a href="${window.location.origin}" target="_blank">conflicttracker.io</a>
      <span>Updated: ${new Date(data.meta.lastUpdated).toLocaleDateString()}</span>
    </div>`;
}).catch(() => { document.getElementById('card').innerHTML = '<div class="embed-label">Failed to load</div>'; });
</script>
</body>
</html>
